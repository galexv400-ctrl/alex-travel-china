<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hebrew Daily Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      color: #eee;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .subtitle { color: #a0aec0; font-size: 0.9rem; margin-bottom: 24px; }

    /* Streak bar */
    .streak-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 10px 20px;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }
    .streak-flame { font-size: 1.4rem; }
    .streak-count { font-weight: 700; font-size: 1.2rem; color: #f6ad55; }

    /* Progress */
    .progress-wrap {
      width: 100%;
      max-width: 520px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a0aec0;
    }
    .progress-bar-outer {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      height: 8px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #48bb78, #68d391);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      padding: 36px 32px;
      text-align: center;
      backdrop-filter: blur(8px);
      margin-bottom: 20px;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .hebrew-word {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 4px;
      direction: rtl;
      color: #fff;
      line-height: 1.1;
    }
    .pronunciation {
      color: #90cdf4;
      font-size: 1rem;
      font-style: italic;
    }
    .category-badge {
      background: rgba(102, 126, 234, 0.3);
      border: 1px solid rgba(102, 126, 234, 0.5);
      border-radius: 99px;
      padding: 3px 14px;
      font-size: 0.75rem;
      color: #a3bffa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Answer input */
    .answer-section {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .answer-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .answer-input:focus { border-color: #667eea; }
    .answer-input.correct { border-color: #48bb78; background: rgba(72,187,120,0.1); }
    .answer-input.wrong   { border-color: #fc8181; background: rgba(252,129,129,0.1); }

    .btn-row { display: flex; gap: 10px; }
    button {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }
    .btn-check  { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-skip   { background: rgba(255,255,255,0.1); color: #ccc; }
    .btn-next   { background: linear-gradient(135deg, #48bb78, #38a169); color: #fff; display: none; }

    /* Feedback */
    .feedback {
      font-size: 1.1rem;
      font-weight: 600;
      min-height: 28px;
      transition: opacity 0.3s;
    }
    .feedback.correct { color: #68d391; }
    .feedback.wrong   { color: #fc8181; }
    .feedback.reveal  { color: #f6ad55; }

    /* Score summary */
    .score-summary {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    .score-big { font-size: 3rem; font-weight: 700; color: #f6ad55; }
    .score-label { color: #a0aec0; font-size: 0.95rem; }
    .encouragement { font-size: 1.2rem; }
    .missed-list { text-align: left; width: 100%; }
    .missed-list h3 { color: #a0aec0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .missed-item {
      background: rgba(252,129,129,0.1);
      border-left: 3px solid #fc8181;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .missed-item .heb { font-size: 1.2rem; direction: rtl; margin-right: 8px; }
    .missed-item .eng { color: #a0aec0; }
    .btn-restart { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; width: 100%; max-width: 300px; padding: 14px; }

    /* Motivational quotes */
    .daily-quote {
      max-width: 520px;
      text-align: center;
      color: #718096;
      font-size: 0.85rem;
      font-style: italic;
      margin-top: 8px;
    }
  </style>
</head>

  // --- State ---
  let queue = [], current = 0, score = 0, missed = [], answered = false;
  const ROUND_SIZE = 10;

  // --- Storage ---
  function loadStreak() {
    const data = JSON.parse(localStorage.getItem('heb_streak') || '{}');
    return { count: data.count || 0, lastDate: data.lastDate || null };
  }
  function saveStreak() {
    const today = new Date().toISOString().slice(0, 10);
    const s = loadStreak();
    if (s.lastDate === today) return s.count;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const newCount = s.lastDate === yesterday ? s.count + 1 : 1;
    localStorage.setItem('heb_streak', JSON.stringify({ count: newCount, lastDate: today }));
    return newCount;
  }
  function renderStreak() {
    const s = loadStreak();
    document.getElementById('streakCount').textContent = s.count;
    if (s.lastDate) {
      const d = new Date(s.lastDate + 'T12:00:00');
      document.getElementById('lastPracticed').textContent =
        'Last: ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }
  }

  // --- Session ---
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startSession() {
    queue = shuffle(VOCAB).slice(0, ROUND_SIZE);
    current = 0; score = 0; missed = [];
    document.getElementById('scoreSummary').style.display = 'none';
    document.getElementById('quizSection').style.display = 'flex';
    document.getElementById('mainCard').style.display = 'flex';
    document.getElementById('dailyQuote').style.display = 'block';
    document.getElementById('dailyQuote').textContent =
      QUOTES[Math.floor(Math.random() * QUOTES.length)];
    renderStreak();
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = queue[current];
    document.getElementById('hebrewWord').textContent = q.heb;
    document.getElementById('pronunciation').textContent = '(' + q.pron + ')';
    document.getElementById('categoryBadge').textContent = q.cat;
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').className = 'answer-input';
    document.getElementById('answerInput').disabled = false;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('btnCheck').style.display = '';
    document.getElementById('btnSkip').style.display = '';
    document.getElementById('btnNext').style.display = 'none';
    updateProgress();
    document.getElementById('answerInput').focus();
  }

  function updateProgress() {
    document.getElementById('progressText').textContent =
      'Question ' + (current + 1) + ' of ' + ROUND_SIZE;
    document.getElementById('scoreText').textContent = 'Score: ' + score;
    document.getElementById('progressBar').style.width =
      (current / ROUND_SIZE * 100) + '%';
  }

  function normalise(s) {
    return s.trim().toLowerCase().replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ');
  }

  function checkAnswer() {
    if (answered) return;
    const q = queue[current];
    const raw = document.getElementById('answerInput').value;
    const typed = normalise(raw);
    if (!typed) return;
    const correct = q.eng.some(e => normalise(e) === typed);
    answered = true;
    document.getElementById('answerInput').disabled = true;
    if (correct) {
      score++;
      document.getElementById('answerInput').className = 'answer-input correct';
      document.getElementById('feedback').textContent = '✓ Correct! ' + q.heb + ' = ' + q.eng[0];
      document.getElementById('feedback').className = 'feedback correct';
    } else {
      missed.push(q);
      document.getElementById('answerInput').className = 'answer-input wrong';
      document.getElementById('feedback').textContent =
        '✗  Answer: ' + q.eng[0] + (q.eng.length > 1 ? ' (also: ' + q.eng.slice(1).join(', ') + ')' : '');
      document.getElementById('feedback').className = 'feedback wrong';
    }
    document.getElementById('btnCheck').style.display = 'none';
    document.getElementById('btnSkip').style.display = 'none';
    document.getElementById('btnNext').style.display = '';
    updateProgress();
  }

  function skipQuestion() {
    if (answered) return;
    const q = queue[current];
    answered = true;
    missed.push(q);
    document.getElementById('answerInput').disabled = true;
    document.getElementById('feedback').textContent =
      '→ ' + q.heb + ' = ' + q.eng[0];
    document.getElementById('feedback').className = 'feedback reveal';
    document.getElementById('btnCheck').style.display = 'none';
    document.getElementById('btnSkip').style.display = 'none';
    document.getElementById('btnNext').style.display = '';
    updateProgress();
  }

  function nextQuestion() {
    current++;
    if (current >= ROUND_SIZE) {
      endSession();
    } else {
      showQuestion();
    }
  }

  function endSession() {
    const streak = saveStreak();
    renderStreak();
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressText').textContent = 'Complete!';
    document.getElementById('scoreText').textContent = 'Score: ' + score;
    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('mainCard').style.display = 'none';

    const pct = score / ROUND_SIZE;
    let enc = ENCOURAGEMENTS[ENCOURAGEMENTS.length - 1];
    for (const e of ENCOURAGEMENTS) {
      if (pct >= parseFloat(e[0]) / 100) { enc = e; break; }
    }

    document.getElementById('scoreBig').textContent = score + ' / ' + ROUND_SIZE;
    document.getElementById('scoreLabel').textContent =
      Math.round(pct * 100) + '% correct';
    document.getElementById('encouragement').textContent = enc[1] + '  ' + enc[2];

    const ml = document.getElementById('missedList');
    ml.innerHTML = '';
    if (missed.length) {
      const h = document.createElement('h3');
      h.textContent = 'Review these:';
      ml.appendChild(h);
      missed.forEach(q => {
        const d = document.createElement('div');
        d.className = 'missed-item';
        d.innerHTML = '<span class="heb">' + q.heb + '</span>' +
          ' <span style="color:#90cdf4;font-size:0.8rem">(' + q.pron + ')</span>' +
          ' <span class="eng">= ' + q.eng[0] + '</span>';
        ml.appendChild(d);
      });
    }

    document.getElementById('scoreSummary').style.display = 'flex';
    document.getElementById('dailyQuote').style.display = 'none';
  }

  // --- Event listeners ---
  document.getElementById('btnCheck').addEventListener('click', checkAnswer);
  document.getElementById('btnSkip').addEventListener('click', skipQuestion);
  document.getElementById('btnNext').addEventListener('click', nextQuestion);
  document.getElementById('answerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (!answered) checkAnswer();
      else nextQuestion();
    }
  });

  // --- Boot ---
  startSession();
</script>
</body>
</html>
